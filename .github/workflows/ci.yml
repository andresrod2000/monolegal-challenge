name: CI

on:
  pull_request:
    branches: [main, develop, uat]
  push:
    branches: [main, develop, uat]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build .NET backend
        working-directory: backend/dotnet
        run: |
          dotnet restore
          dotnet build --no-restore

      - name: Test .NET backend
        working-directory: backend/dotnet
        run: dotnet test --no-build

      - name: Build frontend
        run: npm run build --prefix apps/frontend
