    <text x="90" y="278" font-size="10" fill="#94a3b8">CRUD sincrono | delega a use cases</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="470" y="180" width="390" height="120" rx="12" fill="#1e293b" stroke="#059669" stroke-width="2"/>
