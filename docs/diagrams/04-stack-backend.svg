    <text x="350" y="147" font-size="11" fill="#94a3b8">ASP.NET Core + Worker Service</text>
  </g>

  <!-- Apps -->
  <g filter="url(#shadow)">
    <rect x="60" y="180" width="390" height="120" rx="12" fill="#1e293b" stroke="#2563eb" stroke-width="2"/>
