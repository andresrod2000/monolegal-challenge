<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="sysGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="actorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="920" height="520" fill="#f1f5f9"/>
  <text x="460" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Contexto del sistema - Monolegal Challenge</text>
  <text x="460" y="68" text-anchor="middle" font-size="13" fill="#64748b">Actores externos y sistemas con los que interactua la solucion</text>

  <!-- Actors -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="180" height="90" rx="12" fill="url(#actorGrad)" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="150" cy="155" r="18" fill="#2563eb"/>
    <text x="150" y="160" text-anchor="middle" font-size="14" fill="#fff">Op</text>
    <text x="150" y="192" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Operador interno</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="680" y="380" width="180" height="90" rx="12" fill="url(#actorGrad)" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="770" cy="415" r="18" fill="#059669"/>
    <text x="770" y="420" text-anchor="middle" font-size="14" fill="#fff">@</text>
    <text x="770" y="452" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Cliente facturado</text>
  </g>

  <!-- System boundary -->
  <rect x="250" y="110" width="420" height="280" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="460" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">SISTEMA MONOLEGAL</text>

  <!-- Core system box -->
  <g filter="url(#shadow)">
    <rect x="300" y="170" width="320" height="180" rx="16" fill="url(#sysGrad)"/>
    <text x="460" y="210" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">Monolegal Platform</text>
    <rect x="330" y="230" width="120" height="44" rx="8" fill="#ffffff22" stroke="#ffffff55"/>
    <text x="390" y="257" text-anchor="middle" font-size="12" fill="#fff">Next.js Dashboard</text>
    <rect x="470" y="230" width="120" height="44" rx="8" fill="#ffffff22" stroke="#ffffff55"/>
    <text x="530" y="257" text-anchor="middle" font-size="12" fill="#fff">Express API</text>
    <rect x="400" y="290" width="120" height="44" rx="8" fill="#ffffff22" stroke="#ffffff55"/>
    <text x="460" y="317" text-anchor="middle" font-size="12" fill="#fff">Worker Cron</text>
  </g>

  <!-- External systems -->
  <g filter="url(#shadow)">
    <ellipse cx="150" cy="400" rx="95" ry="50" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="150" y="395" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">MongoDB</text>
    <text x="150" y="415" text-anchor="middle" font-size="11" fill="#15803d">Persistencia</text>
  </g>
  <g filter="url(#shadow)">
    <ellipse cx="770" cy="200" rx="95" ry="50" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="770" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Gmail SMTP</text>
    <text x="770" y="215" text-anchor="middle" font-size="11" fill="#b45309">Recordatorios</text>
  </g>

  <!-- Arrows -->
  <line x1="150" y1="210" x2="300" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="200" font-size="11" fill="#475569">Dashboard CRUD</text>
  <line x1="350" y1="390" x2="220" y2="390" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="260" y="378" font-size="11" fill="#475569">Lee / Escribe</text>
  <line x1="620" y1="250" x2="675" y2="220" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="238" font-size="11" fill="#475569">SMTP</text>
  <line x1="770" y1="250" x2="770" y2="380" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="785" y="320" font-size="11" fill="#475569">Email</text>
</svg>
