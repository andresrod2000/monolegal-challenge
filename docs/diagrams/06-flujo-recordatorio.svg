<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#475569"/></marker>
  </defs>
  <rect width="1000" height="380" fill="#f8fafc"/>
  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Flujo de recordatorio - Una factura</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#64748b">ProcessInvoiceRemindersUseCase.processInvoice()</text>

  <!-- Swimlanes -->
  <rect x="30" y="80" width="940" height="260" rx="12" fill="#fff" stroke="#e2e8f0"/>
  <line x1="30" y1="130" x2="970" y2="130" stroke="#e2e8f0"/>
  <text x="50" y="115" font-size="11" font-weight="700" fill="#64748b">USE CASE</text>
  <text x="50" y="155" font-size="11" font-weight="700" fill="#64748b">DOMAIN</text>
  <text x="50" y="195" font-size="11" font-weight="700" fill="#64748b">INFRA</text>
  <text x="50" y="235" font-size="11" font-weight="700" fill="#64748b">EXTERNAL</text>

  <!-- Steps -->
  <g filter="url(#shadow)">
    <rect x="80" y="88" width="130" height="36" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="145" y="111" text-anchor="middle" font-size="10" fill="#1e40af">1. findByStatus</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="240" y="88" width="130" height="36" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="305" y="111" text-anchor="middle" font-size="10" fill="#1e40af">2. findClient</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="400" y="168" width="160" height="36" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="480" y="191" text-anchor="middle" font-size="10" fill="#5b21b6">3. buildReminderPayload</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="590" y="208" width="130" height="36" rx="8" fill="#ffedd5" stroke="#ea580c"/>
    <text x="655" y="231" text-anchor="middle" font-size="10" fill="#9a3412">4. sendReminder</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="750" y="88" width="130" height="36" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="815" y="111" text-anchor="middle" font-size="10" fill="#1e40af">5. updateStatus</text>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="655" cy="310" rx="70" ry="28" fill="#fef3c7" stroke="#d97706"/>
    <text x="655" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Gmail SMTP</text>
  </g>
  <g filter="url(#shadow)">
    <ellipse cx="815" cy="310" rx="70" ry="28" fill="#dcfce7" stroke="#16a34a"/>
    <text x="815" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">MongoDB</text>
  </g>

  <line x1="210" y1="106" x2="235" y2="106" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="106" x2="395" y2="106" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="168" x2="480" y2="120" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="560" y1="186" x2="585" y2="208" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="226" x2="750" y2="106" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="655" y1="244" x2="655" y2="282" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="815" y1="124" x2="815" y2="282" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="80" y="340" width="840" height="28" rx="6" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="500" y="358" text-anchor="middle" font-size="11" fill="#991b1b">Si sendReminder falla: no actualiza estado | Si updateStatus falla: warn emailAlreadySent</text>
